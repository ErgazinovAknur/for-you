  <!-- PLAYLIST -->
  <section id="playlist" class="view pixel-box">
    <h2 class="section-title">🎧плейлист</h2>
    <p class="hint">вставь ссылку на YouTube, Spotify или прямой mp3-файл. можно разложить песни по сборникам.</p>
    <form id="song-form" class="song-form">
      <input type="url" id="song-link" placeholder="вставь ссылку сюда 🔗" required maxlength="300">
      <input type="text" id="song-group" placeholder="сборник (необязательно)" list="group-options" maxlength="40">
      <datalist id="group-options"></datalist>
      <button type="submit" class="pixel-btn">＋ добавить</button>
    </form>
    <div id="song-status" class="status-line"></div>

    <!-- ===== плеер ===== -->
    <div class="player">
      <div class="player-cover">
        <div id="yt-target"></div>
        <div id="cover-placeholder" class="cover-placeholder">🎵</div>
      </div>
      <div class="player-body">
        <div class="player-title" id="player-title">ничего не играет</div>
        <div class="player-sub" id="player-sub">выбери песню из списка ниже</div>
        <div class="progress-bar" id="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="time-row"><span id="time-current">0:00</span><span id="time-total">0:00</span></div>
        <div class="player-controls">
          <button id="btn-prev" class="pixel-btn small" title="предыдущая">⏮</button>
          <button id="btn-playpause" class="pixel-btn small" title="play/pause">▶</button>
          <button id="btn-next" class="pixel-btn small" title="следующая">⏭</button>
          <button id="btn-stop" class="pixel-btn small" title="стоп">⏹</button>
          <button id="btn-repeat" class="pixel-btn small" title="повтор">➡️</button>
        </div>
        <div class="player-controls secondary">
          <span class="ctrl-label">скорость</span>
          <button id="speed-down" class="pixel-btn small">🐢</button>
          <span id="speed-label">1x</span>
          <button id="speed-up" class="pixel-btn small">🐇</button>
          <span class="ctrl-label">звук</span>
          <button id="vol-down" class="pixel-btn small">🔉</button>
          <input type="range" id="vol-slider" min="0" max="100" value="80">
          <button id="vol-up" class="pixel-btn small">🔊</button>
        </div>
      </div>
    </div>
    <audio id="audio-el" preload="none"></audio>

    <div id="song-groups"></div>
  </section>

  <!-- CALENDAR -->
  <section id="calendar" class="view pixel-box">
    <h2 class="section-title">🗓️ календарь</h2>

    <div class="cal-nav">
      <button id="cal-prev" class="pixel-btn small">◀</button>
      <button id="cal-month-label" class="cal-month-label" type="button">июль 2026</button>
      <button id="cal-next" class="pixel-btn small">▶</button>
    </div>

    <div id="month-picker" class="month-picker chunky-border">
      <div class="mp-year-row">
        <button id="mp-year-prev" class="pixel-btn small">◀</button>
        <span id="mp-year-label" class="mp-year-label"></span>
        <button id="mp-year-next" class="pixel-btn small">▶</button>
      </div>
      <div id="mp-months" class="mp-months"></div>
    </div>

    <div id="cal-grid" class="cal-grid"></div>

    <h3 class="section-title small-title">📌 ближайшие важные даты</h3>
    <ul id="upcoming-list" class="upcoming-list"></ul>
  </section>

</main>

<!-- modal for calendar note details -->
<div id="modal-overlay" class="modal-overlay">
  <div class="modal pixel-box">
    <button id="modal-close" class="pixel-btn small close-btn">✕</button>
    <h3 id="modal-date-label" class="section-title small-title"></h3>
    <ul id="modal-note-list" class="note-list"></ul>
    <form id="note-form" class="note-form">
      <input type="text" id="note-text" placeholder="что за дата? 🎀" maxlength="120" required>
      <label class="checkbox-line">
        <input type="checkbox" id="note-important">
        это важно / дедлайн ⚠️
      </label>
      <button type="submit" class="pixel-btn">сохранить</button>
    </form>
  </div>
</div>

<footer>
  сделано с 💗 · <span id="year"></span>
</footer>
